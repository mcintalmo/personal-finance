# Pre-commit hooks — runs on `git commit` after `pre-commit install`.
# Update hook revisions periodically with: pre-commit autoupdate
#
# All hooks use uv to stay consistent with the project environment.
# See https://pre-commit.com for documentation.

default_language_version:
  python: python3.14

repos:
  # ── General file hygiene ───────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  # ── Ruff: lint + format (replaces black, isort, flake8) ───
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── ty: type checking ──────────────────────────────────────
  # ty is in beta — remove this hook if it causes noise during early development.
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run ty check src/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
