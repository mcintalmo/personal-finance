name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      # ── Lint ──────────────────────────────────────────────
      - name: Ruff — lint
        run: uv run ruff check . --output-format=github

      - name: Ruff — format check
        run: uv run ruff format --check .

      # ── Type check ────────────────────────────────────────
      - name: ty — type check
        run: uv run ty check src/

      # ── Tests ─────────────────────────────────────────────
      - name: pytest — run tests with coverage
        run: uv run pytest --cov=personal_finance --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        # Optional — delete this step if you don't use Codecov.
        # Sign up at https://codecov.io and add CODECOV_TOKEN to GitHub Secrets.
        if: ${{ always() }}
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
