version: 2

# The application's entity tables (created by personal_finance.ddl, seeded by
# personal_finance.seed) live in the warehouse's main schema.
sources:
  - name: app
    schema: main
    tables:
      - name: categories
        description: Hierarchical taxonomy seeded from config taxonomy.yaml.
      - name: rules
        description: >-
          Deterministic pattern → category rules seeded from config rules.yaml
          (personal_finance.seed.seed_rules); priority is file order, first
          match wins.
      - name: merchant_aliases
        description: >-
          Deterministic pattern → canonical merchant name seeded from config
          merchants.yaml (personal_finance.seed.seed_merchant_aliases);
          priority is file order, first match wins. Resolves brand variants
          the generic normalize_merchant macro can't.
      - name: merchant_embeddings
        description: >-
          Cached embedding vector per distinct merchant_name, computed via a
          local Ollama call (personal_finance.embed.compute_missing_embeddings,
          `pf enrich`) and reused across runs.
      - name: merchant_llm_categories
        description: >-
          Cached LLM category choice per distinct merchant_name, computed via
          a local Ollama chat call
          (personal_finance.llm_categorize.compute_missing_llm_categories,
          `pf classify`) and reused across runs.
      - name: labels
        description: >-
          Human categorization corrections (personal_finance.review.record_label,
          `pf review label`) — training data for future classifier
          improvements, and the highest-priority categorization stage.

  # Bronze = raw source exports landed as Parquet by dlt (Phase 2). Read as a
  # single config-free glob over every source directory: a new bank/source
  # appears in silver automatically once ingested, no dbt change needed.
  # union_by_name tolerates schema drift (e.g. external_id present only for some
  # sources); DATA_BRONZE_PATH is shared with the app (Settings.data.bronze_path).
  - name: bronze
    description: Raw ingested transactions across every source, landed by dlt.
    tables:
      - name: transactions
        description: Every ingested transaction row, unioned across sources by column name.
        meta:
          external_location: >-
            read_parquet(
              '{{ env_var('DATA_BRONZE_PATH', 'data/bronze') }}/bronze/*/*.parquet',
              union_by_name = true,
              filename = true
            )
