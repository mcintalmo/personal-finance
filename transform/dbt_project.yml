# dbt project for the medallion transform layer (docs/ARCHITECTURE.md).
# Bronze = raw Parquet landings (dlt, Phase 2) exposed as dbt sources.
# Silver = cleaned/enriched models. Gold = query-ready marts.

name: personal_finance_transform
version: "0.1.0"
profile: personal_finance

model-paths: ["models"]
test-paths: ["tests"]

# User-tunable knobs (override with `dbt build --vars '{transfer_window_days: 5}'`).
vars:
  # How many days apart the two legs of an inter-account transfer may post
  # (ACH can settle a day or two after it leaves). See silver_transfers.
  transfer_window_days: 3
  # Embedding-similarity categorization stage (must match Settings.ollama.
  # embedding_model / `pf enrich`, since that's what merchant_embeddings.model
  # holds). Below this cosine-similarity score, a candidate merchant's nearest
  # match is too weak to trust — left uncategorized for a later stage instead.
  embedding_model: nomic-embed-text
  embedding_confidence_threshold: 0.80
  # Local-LLM fallback categorization stage (must match Settings.ollama.
  # chat_model / `pf classify`, since that's what merchant_llm_categories.model
  # holds). Below this self-reported confidence, the LLM's guess is too weak
  # to trust — left uncategorized for a later stage (human review) instead.
  llm_model: phi3:mini
  llm_confidence_threshold: 0.50
  # Known city names normalize_merchant can safely strip as a trailing
  # locality even with no state code to anchor on (e.g. "THAI GINGER
  # BELLEVUE" -> "THAI GINGER"). Sourced from places.yaml via `pf transform`;
  # empty by default so a config-free build is a no-op here, same as every
  # other cascade stage.
  known_cities: []

clean-targets:
  - target
  - dbt_packages

models:
  personal_finance_transform:
    silver:
      +materialized: view
      +schema: silver
    gold:
      +materialized: table
      +schema: gold
